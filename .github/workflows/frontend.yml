name: frontend-ci

on:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

defaults:
  run:
    working-directory: frontend

# pnpm/action-setup@v4 still ships on Node.js 20, which GitHub deprecated.
# Force the runner to execute JS actions on Node.js 24 until upstream
# publishes a release we can pin to.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          # Version is pinned by the `packageManager` field in
          # frontend/package.json. The action looks at repo root by
          # default, so point it at the right file explicitly.
          package_json_file: frontend/package.json
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm vitest --run
      - run: pnpm build
