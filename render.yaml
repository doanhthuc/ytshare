# Render Blueprint — deploys the full demo stack:
#   - managed Postgres (free)
#   - managed Redis / Key Value (free)
#   - Go backend Web Service (Docker, free)
#   - React frontend Static Site (free)
#
# Usage:
#   1. Push this repo to GitHub.
#   2. In Render, New + Blueprint -> select this repo. Render reads render.yaml.
#   3. After the first deploy succeeds, fill the three env vars marked
#      "sync: false" (CORS_ALLOWED_ORIGINS on the API, and VITE_API_BASE_URL
#      and VITE_WS_BASE_URL on the web). Trigger a redeploy of each service.

databases:
  - name: ytshare-db
    plan: free
    databaseName: ytshare
    user: ytshare

services:
  - type: redis
    name: ytshare-redis
    plan: free
    ipAllowList: [] # internal-only; reachable from other Render services in the same workspace

  - type: web
    name: ytshare-api
    runtime: docker
    plan: free
    region: singapore
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: APP_ENV
        value: production
      - key: HTTP_PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: ytshare-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: ytshare-redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL_MIN
        value: 15
      - key: JWT_REFRESH_TTL_HOURS
        value: 168
      - key: MIGRATIONS_DIR
        value: /app/migrations
      # Set this after the frontend has a public URL, e.g.
      #   https://ytshare-web.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  - type: web
    name: ytshare-web
    runtime: static
    rootDir: frontend
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    staticPublishPath: ./dist
    envVars:
      # Set these after the API has a public URL, e.g.
      #   VITE_API_BASE_URL=https://ytshare-api.onrender.com/api/v1
      #   VITE_WS_BASE_URL=wss://ytshare-api.onrender.com/api/v1
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_WS_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
