services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ytshare
      POSTGRES_PASSWORD: ytshare
      POSTGRES_DB: ytshare
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ytshare -d ytshare"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot job that applies pending schema migrations before the API
  # starts. Lives in the same image as the server so it always uses the
  # version of the migrations that shipped with this build.
  migrate:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ytshare
      DB_PASSWORD: ytshare
      DB_NAME: ytshare
      DB_SSLMODE: disable
      MIGRATIONS_DIR: /app/migrations
    entrypoint: ["/app/migrate"]
    command: ["up"]
    restart: "no"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      APP_ENV: development
      HTTP_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ytshare
      DB_PASSWORD: ytshare
      DB_NAME: ytshare
      DB_SSLMODE: disable
      REDIS_ADDR: redis:6379
      JWT_ACCESS_SECRET: dev-access-secret-change-me
      JWT_REFRESH_SECRET: dev-refresh-secret-change-me
      JWT_ACCESS_TTL_MIN: 15
      JWT_REFRESH_TTL_HOURS: 168
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
      MIGRATIONS_DIR: /app/migrations
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080/api/v1
        VITE_WS_BASE_URL: ws://localhost:8080/api/v1
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres-data:
